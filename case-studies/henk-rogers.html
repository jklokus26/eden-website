        <h1>Henk Rogers Case Study | Eden Communications</h1>
        <p>How Eden Communications leveraged the Tetris film Hollywood moment to build a global climate advocacy platform for Henk Rogers, co-founder of Tetris and founder of Blue Planet Alliance.</p>
        <h2>The Challenge</h2>
        <p>Leverage the cultural momentum of the Tetris film to build a lasting climate advocacy platform rather than a short-lived press moment.</p>
        <h2>The Results</h2>
        <ul>
          <li>28.5M+ campaign impressions</li>
          <li>40 media placements including NPR How I Built This (one of the season's most-listened episodes), Forbes, and Bloomberg</li>
          <li>$2.19M ad value equivalency</li>
        </ul>
        <p>Service: Campaign Strategy | Agency: Eden Communications, New York City</p>
