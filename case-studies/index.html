        <h1>Case Studies | Eden Communications Crypto PR Agency</h1>
        <p>See how Eden Communications, a New York City-based crypto PR agency, builds institutional credibility for fintech, blockchain, and digital asset companies through strategic PR campaigns.</p>

        <h2>Ondo Finance - Communications Strategy</h2>
        <p>Flipped a 24-point share of voice deficit into a 61% lead in tokenized securities coverage within 90 days. Tripled monthly media volume to 2,000+ articles/month. Featured on CNBC Squawk Box, WSJ, NYT, Bloomberg, Reuters, Axios. BlackRock called Ondo the "gold standard."</p>

        <h2>Stellar Development Foundation - Media Relations</h2>
        <p>4.65M+ views on campaign content. 632M total audience reach. 36 placements including CNN, CNBC, Bloomberg, Yahoo Finance, Axios. Live CNBC and Bloomberg TV appearances.</p>

        <h2>Reed Smith On Chain - Thought Leadership</h2>
        <p>48 earned placements including CNBC, Bloomberg, Washington Post, Fortune, CoinDesk. 2.88M+ estimated views. 467M total audience. Positioned as trusted crypto legal authority during FTX trial.</p>

        <h2>Blue Planet Energy - Earned Media</h2>
        <p>1,898% increase in landing page traffic. 300% website traffic growth. $500K+ in ad value equivalency. Featured in Forbes, Business Insider.</p>

        <h2>Henk Rogers - Campaign Strategy</h2>
        <p>28.5M+ campaign impressions. 40 media placements including NPR How I Built This, Forbes, Bloomberg. $2.19M ad value equivalency.</p>

        <h2>Grip Shipping - PR Strategy</h2>
        <p>4,050% increase in press coverage. 20+ media placements. 135% growth in market share of voice. Featured on top 5% podcasts globally.</p>

        <h2>Franzy - Launch Campaign</h2>
        <p>4,300% increase in platform sign-ups. 22 media placements including Business Insider, Entrepreneur, Inc., Fox Business, Yahoo Finance. 52.9% share of voice in franchise tech. 73M+ estimated media reach.</p>
