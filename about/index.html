        <h1>About Eden Communications | NYC Crypto PR Agency</h1>
        <p>Eden Communications is a strategic public relations firm headquartered in New York City, specializing in crypto, fintech, blockchain, digital assets, and frontier technology. Founded by former journalist Ebony Lewkovitz, the team brings newsroom experience from the New York Post, ABC News, Al Jazeera, and the Sydney Morning Herald, combined with communications leadership from Meta, Google, Mastercard, Deloitte, and OKX.</p>

        <h2>Our Team</h2>

        <h3>Ebony Lewkovitz, Founder</h3>
        <p>Ebony Lewkovitz is a media industry veteran and award-winning former reporter who served as The New York Post's Washington Correspondent, with stints at ABC News, The Sydney Morning Herald, and Al Jazeera. She has represented Fortune 500 companies, tech startups, and high-net-worth individuals across executive visibility and strategic communications.</p>

        <h3>Larissa Bundziak, Director</h3>
        <p>Larissa Bundziak is a media relations expert specializing in high-tech financial firms. As former global communications lead at OKX, she grew headline articles 12-fold and mainstream coverage 5-fold in a year. She has media trained CEOs from multibillion-dollar public companies to seed-stage startups.</p>

        <h3>Gabrielle Gomez, Managing Account Supervisor</h3>
        <p>Gabrielle Gomez is a financial and professional services communications strategist specializing in crafting narratives that bridge traditional finance (TradFi), decentralized finance (DeFi), and emerging technology. Background with Mastercard, Deloitte, Fidelity, and Wells Fargo across AI, banking, and M&A verticals.</p>

        <p>Contact: hello@edencommunications.com | 600 Lexington Avenue, New York, NY 10022</p>
      </article>
